# =============================================================================
# AquaponicAI — Full Stack Docker Compose
# =============================================================================
#
# DATABASE MODE — controlled by DATABASE_URL in .env:
#
#   Supabase (default — recommended):
#     DATABASE_URL=postgresql+asyncpg://...supabase.com.../postgres...
#     docker compose up --build
#     → only redis, backend, frontend, nginx start.
#       Local postgres is NOT started (no confusion, no unused container).
#
#   Local PostgreSQL (offline / dev without Supabase):
#     Comment out or remove DATABASE_URL from .env, then:
#     docker compose --profile local up --build
#     → local postgres + adminer also start; backend falls back to
#       postgresql+asyncpg://aquaponic:<POSTGRES_PASSWORD>@postgres:5432/aquaponic_db
#
# =============================================================================

networks:
  aquaponic_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  storage_data:
  eval_data:

services:

  # ── PostgreSQL (local-only profile) ────────────────────────────────────────
  # Only starts when you explicitly run: docker compose --profile local up
  # When DATABASE_URL points to Supabase this container is NOT needed.
  postgres:
    profiles: [local]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aquaponic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: aquaponic_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquaponic -d aquaponic_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aquaponic_net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aquaponic_net

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # DATABASE_URL comes from env_file (.env) — do NOT override it here.
      # If .env points to Supabase, the container uses Supabase.
      # REDIS_URL must be the Docker service name, not the host-side port.
      REDIS_URL: redis://redis:6379/0
      HF_HOME: /app/.cache/huggingface
      STT_PROVIDER: sarvam
    volumes:
      - storage_data:/app/storage
      - eval_data:/app/data
      - ./backend/.cache/huggingface:/app/.cache/huggingface
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    # GPU passthrough removed — app uses Sarvam STT API instead of local Whisper
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aquaponic_net

  # ── Frontend (React / Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - aquaponic_net

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - aquaponic_net

  # ── Adminer / Database GUI (local-only profile) ───────────────────────────────
  # Only starts alongside local postgres.
  adminer:
    profiles: [local]
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - aquaponic_net
