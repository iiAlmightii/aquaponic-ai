# =============================================================================
# AquaponicAI — Full Stack Docker Compose
# =============================================================================
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose up --build
# =============================================================================

networks:
  aquaponic_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  storage_data:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aquaponic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: aquaponic_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquaponic -d aquaponic_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aquaponic_net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aquaponic_net

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    gpus: all
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aquaponic:${POSTGRES_PASSWORD:-secret}@postgres:5432/aquaponic_db
      REDIS_URL: redis://redis:6379/0
      HF_HOME: /app/.cache/huggingface
      GOOGLE_SHEETS_SERVICE_ACCOUNT_FILE: ${GOOGLE_SHEETS_SERVICE_ACCOUNT_FILE:-/run/secrets/google-service-account.json}
    volumes:
      - storage_data:/app/storage
      - ./backend/.cache/huggingface:/app/.cache/huggingface
      - ./.secrets/google-service-account.json:/run/secrets/google-service-account.json:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aquaponic_net

  # ── Frontend (React / Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - aquaponic_net

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - aquaponic_net

  # ── Adminer (Database GUI) ───────────────────────────────────────────────────
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - aquaponic_net
